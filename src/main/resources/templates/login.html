<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Kitchen Master</title>
    <link rel="shortcut icon" href="/images/favicon.ico" th:href="@{/images/favicon.ico}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous"
          th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          rel="stylesheet" crossorigin="anonymous"
          th:href="@{/webjars/font-awesome/6.7.2/css/all.min.css}">

    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .login-header {
            background: #212529;
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-header i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        .login-body {
            padding: 2rem;
        }
        .login-body .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .login-body .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        .btn-login {
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .login-footer {
            text-align: center;
            padding: 1rem 2rem 1.5rem;
        }
        .demo-credentials {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
        .demo-credentials code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card bg-white">
            <div class="login-header">
                <i class="fas fa-utensils"></i>
                <h3 class="mb-1">Kitchen Master</h3>
                <p class="mb-0 text-white-50">Sign in to manage recipes</p>
            </div>

            <div class="login-body">
                <!-- Error Alert -->
                <div th:if="${loginError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle"></i> Invalid username or password.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Logout Success Alert -->
                <div th:if="${logoutSuccess}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i> You have been signed out.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Enter your email" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login w-100">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="demo-credentials">
                    <strong><i class="fas fa-info-circle"></i> Demo Credentials:</strong><br>
                    <div class="mt-1">
                        <strong>Admin:</strong> <code>user1@gmail.com</code> / <code>pass</code><br>
                        <strong>User:</strong> <code>user2@gmail.com</code> / <code>pass</code>
                    </div>
                </div>
            </div>

            <div class="login-footer">
                <a href="/" class="text-muted text-decoration-none">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"
            th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
